name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Build
        run: dotnet build -c Release

      - name: Test
        run: dotnet test -c Release --logger "trx;LogFileName=results.trx" --no-build

      - name: Pack
        run: dotnet pack src/InventoryCore/InventoryCore.csproj -c Release -o ./nupkg --no-build
